name: CLA Bot - Easily handle Contributor License Agreements (CLAs)
description: Lightweight GitHub CLA enforcement.
inputs:
  github-token:
    description: GitHub token for reading the target repository and writing PR comments/checks.
    required: true
  registry-token:
    description: Optional token for registry repository access. Defaults to github-token.
    required: false
runs:
  using: node24
  main: dist/index.js
