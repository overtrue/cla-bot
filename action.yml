name: CLA Bot - Easily handle Contributor License Agreements (CLAs)
description: Lightweight GitHub CLA enforcement.
branding:
  icon: 'user-check'
  color: 'green'
inputs:
  github-token:
    description: GitHub token for the repository running the workflow.
    required: true
  registry-token:
    description: Optional token for the registry repository. Use this when registry.repository is a different repo. Defaults to github-token.
    required: false
runs:
  using: node24
  main: dist/index.js
