name: CLA Check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CLA Bot
        uses: your-org/cla-bot@v1
        with:
          github-token: ${{ github.token }}
          registry-token: ${{ secrets.CLA_BOT_REGISTRY_TOKEN }}
