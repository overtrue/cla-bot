enabled: true

document:
  version: v1
  url: https://example.com/cla/v1

signing:
  mode: comment
  comment_pattern: I have read and agree to the CLA.
  case_insensitive: true
  trim_whitespace: true

contributors:
  check_pr_author: true
  check_commit_authors: true
  check_coauthors: false
  exclude_bots: true
  allowlist:
    - dependabot[bot]
    - github-actions[bot]

registry:
  type: json-repo
  repository: overtrue/cla-registry
  path_prefix: signatures
  commit_message_template: "chore: record CLA signature for {{github_login}} from {{source_repo}}#{{source_pr_number}}"

status:
  check_name: CLA Check
  comment_tag: <!-- cla-bot -->
  include_registry_links: true
