enabled: true

document:
  version: v1
  url: https://example.com/cla/v1

signing:
  mode: comment
  comment_pattern: I have read and agree to the CLA.
  case_insensitive: true
  trim_whitespace: true

contributors:
  check_pr_author: true
  check_commit_authors: true
  check_coauthors: false
  exclude_bots: true
  allowlist:
    - dependabot[bot]
    - github-actions[bot]

registry:
  type: json-repo
  repository: overtrue/your-repo
  path_prefix: signatures
  branch: cla-signatures

status:
  check_name: CLA Check
  comment_tag: <!-- cla-bot -->
